# realrealgenuine.com — RRG Next.js app
# Next.js on localhost:3001, static files from /var/www/realrealgenuine.com

server {
    server_name realrealgenuine.com www.realrealgenuine.com;

    # ── Security headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security  'max-age=31536000; includeSubDomains' always;
    add_header X-Content-Type-Options     'nosniff' always;
    add_header X-Frame-Options            'SAMEORIGIN' always;
    add_header Referrer-Policy            'strict-origin-when-cross-origin' always;
    add_header Permissions-Policy         'camera=(), microphone=(), geolocation=()' always;

    # ── Static site root ─────────────────────────────────────────────────
    root /var/www/realrealgenuine.com;
    index index.html;

    # ── RRG MCP endpoint (Next.js app/mcp/route.ts) ─────────────────────
    location /mcp {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # ── RRG API routes ───────────────────────────────────────────────────
    location /api/rrg/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── RRG admin panel ──────────────────────────────────────────────────
    location /admin/rrg {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── RRG Next.js app ─────────────────────────────────────────────────
    location /rrg {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Next.js static assets ────────────────────────────────────────────
    location /_next/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Root: redirect to /rrg ───────────────────────────────────────────
    location = / {
        return 302 /rrg;
    }

    # ── Static files (terms, privacy, collection.png, favicon) ───────────
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    listen 80;
    listen [::]:80;
}
