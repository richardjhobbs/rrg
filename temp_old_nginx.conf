# richard-hobbs.com — Nginx reverse proxy + static site
# MCP server on localhost:3000, static HTML served from /var/www/richard-hobbs.com
# RRG app moved to realrealgenuine.com — 301 redirects for old RRG paths

server {
    server_name richard-hobbs.com www.richard-hobbs.com;

    # ── Security headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security  'max-age=31536000; includeSubDomains' always;
    add_header X-Content-Type-Options     'nosniff' always;
    add_header X-Frame-Options            'SAMEORIGIN' always;
    add_header Referrer-Policy            'strict-origin-when-cross-origin' always;
    add_header Permissions-Policy         'camera=(), microphone=(), geolocation=()' always;

    # ── Static site root ─────────────────────────────────────────────────
    root /var/www/richard-hobbs.com;
    index index.html;

    # ── MCP endpoint (DrHobbs agent — stays on this domain) ──────────────
    location /mcp {
        proxy_pass http://127.0.0.1:3000/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── Agent discovery + x402 manifest ─────────────────────────────────
    location /.well-known/ {
        proxy_pass http://127.0.0.1:3000/.well-known/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check ─────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── 301 Redirects: RRG moved to realrealgenuine.com ──────────────────
    location /rrg {
        return 301 https://realrealgenuine.com$request_uri;
    }

    location /api/rrg/ {
        return 301 https://realrealgenuine.com$request_uri;
    }

    location /admin/rrg {
        return 301 https://realrealgenuine.com$request_uri;
    }

    location /_next/ {
        return 301 https://realrealgenuine.com$request_uri;
    }

    # ── REST API (DrHobbs catalogue, asset delivery — stays) ─────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static files — try exact file, then .html extension, then 404 ────
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/richard-hobbs.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/richard-hobbs.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.richard-hobbs.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = richard-hobbs.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name richard-hobbs.com www.richard-hobbs.com;
    return 404; # managed by Certbot
}
